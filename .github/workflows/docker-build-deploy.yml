name: Build and Deploy Docker image

on:
  workflow_dispatch:

jobs:
  build_push:
    name: Build and push image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kaiots
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: kaiots/web_cal:latest
          build-args: |
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server via SSH
    runs-on: ubuntu-latest
    needs: build_push
    permissions:
      contents: read

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -T -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "${SSH_USER}@${SSH_HOST}" << 'EOF'
          set -euo pipefail
          REPO_DIR="/opt/web_cal/plainwarden"
          REPO_URL="https://github.com/bitplain/plainwarden.git"
          REPO_BRANCH="main"

          mkdir -p /opt/web_cal
          if [ ! -d "${REPO_DIR}/.git" ]; then
            rm -rf "${REPO_DIR}"
            git clone --depth 1 --branch "${REPO_BRANCH}" "${REPO_URL}" "${REPO_DIR}"
          fi

          cd "${REPO_DIR}"
          git fetch origin "${REPO_BRANCH}"
          git checkout "${REPO_BRANCH}"
          git pull --ff-only origin "${REPO_BRANCH}"

          if [ ! -f docker-compose.prod.yml ]; then
            cat > docker-compose.prod.yml << 'YAML'
          services:
            app:
              image: ${APP_IMAGE:-kaiots/web_cal:latest}
              pull_policy: always
          YAML
          fi

          export APP_IMAGE=kaiots/web_cal:latest
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans --wait --no-build
          curl -fsS http://localhost:${PROXY_PORT:-8080}/api/health >/dev/null
          EOF
